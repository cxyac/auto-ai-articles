baseURL = "https://cxyac.github.io/auto-ai-articles/"
languageCode = "zh-CN"
title = "AI收藏夹"
theme = "PaperMod"
defaultContentLanguage = "zh"
enableEmoji = true
paginate = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "AI 相关好文收藏，英文自动翻译为中文"
  author = "cxyac"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowFullTextinRSS = false

  [params.homeInfoParams]
    Title = "AI收藏夹"
    Content = """
收藏 AI 相关的好文章。英文内容自动翻译为中文，中文内容直接收录。
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/cxyac"

  [[params.socialIcons]]
    name = "rss"
    url = "/auto-ai-articles/index.xml"

[menu]
  [[menu.main]]
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "归档"
    url = "/archives/"
    weight = 2
  [[menu.main]]
    name = "搜索"
    url = "/search/"
    weight = 3
  [[menu.main]]
    name = "关于"
    url = "/about/"
    weight = 4
